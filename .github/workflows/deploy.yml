
name: Auto Deploy Project When Push Main Branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Git User Settings
        run: |
          git config --global user.email "qkstjr09@gmail.com"
          git config --global user.name "Jake Park"
      - name: Dependencies
        run: yarn install
        
      - name: Deploy
        run: yarn run deploy
        env:
          GH_PAT: ${{ secrets.ACCESS_TOKEN }}
